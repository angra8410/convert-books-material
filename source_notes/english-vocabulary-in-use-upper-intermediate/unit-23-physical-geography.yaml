chapter:
  id: physical-geography
  title: Physical geography
  order: 23
  cefr:
  - B2
  tags: []
  summary: This unit introduces vocabulary for rivers, mountains, coasts, and other geographical features. It also explains important patterns for using the definite article with place names.
  points:
  - Physical geography vocabulary includes coast, valley, glacier, peak, source, ridge, and delta.
  - Sea and river terms include current, estuary, shore, strait, cape, and peninsula.
  - Individual mountains usually do not take the, but mountain chains do.
  - Rivers, oceans, seas, gulfs, and many groups of islands normally take the.
  - Country names usually do not take the, except in names like the USA or when followed by a limiting phrase.
  - Limiting phrases can change the article pattern, as in the Japan of today.
  examples:
  - english: current / estuary / source / shore / strait / peninsula
  - english: peak / ridge / valley / glacier / mountain chain
  - english: the Himalayas / the Gulf of Mexico / the USA
  - english: the Japan of today / the Brazil of the future
  pitfalls:
  - Do not add the automatically before every country or mountain.
  - Do not forget that rivers and seas usually take the.
  - Do not ignore limiting phrases that change the normal article pattern.
