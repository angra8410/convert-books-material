chapter:
  id: learning-vocabulary
  title: Learning vocabulary
  order: 1
  cefr:
  - B2
  tags: []
  summary: While English boasts a vast vocabulary, most native speakers use only a
    limited number of words daily. This unit explains that learning vocabulary means
    noticing usage, grammar, pronunciation, register, and effective ways to remember
    and expand new words.
  points:
  - Knowing the definition of a word isn't enough; you also need to understand its
    usage.
  - Consider a word's grammar, pronunciation, and register (formal, informal, neutral).
  - Learn words in phrases, noting collocations and grammatical features.
  - Some learners benefit from grouping vocabulary and using visual aids.
  - Reading and listening extensively are effective ways to learn new vocabulary.
  examples:
  - english: formal, informal or neutral
  - english: learn it in phrases
  - english: note pronunciation problems
  - english: reading and listening to as much English as possible
  pitfalls:
  - Do not treat vocabulary learning as memorizing definitions only.
  - Do not ignore grammar, pronunciation, or register when recording a new word.
  - Do not learn words only in isolation without phrases, groups, or context.
  practicePrompts:
  - id: learning-vocabulary-prompt-1
    type: open_text
    targetSkill: VOCABULARY
    prompt: Explain two reasons why knowing a word means more than knowing its definition.
  - id: learning-vocabulary-prompt-2
    type: open_text
    targetSkill: VOCABULARY
    prompt: Describe two methods from this unit that could help you remember and expand
      new vocabulary more effectively.
