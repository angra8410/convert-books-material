chapter:
  id: learning-vocabulary
  title: Learning vocabulary
  order: 1
  cefr:
  - B2
  tags: []
  summary: While English boasts a vast vocabulary, most native speakers use only a
    limited number of words daily. This book aims to expand your vocabulary and teach
    you to use new words correctly.
  points:
  - Knowing the definition of a word isn't enough; you also need to understand its
    usage.
  - Consider a word's grammar, pronunciation, and register (formal, informal, neutral).
  - Learn words in phrases, noting collocations and grammatical features.
  - Some learners benefit from grouping vocabulary and using visual aids.
  - Reading and listening extensively are effective ways to learn new vocabulary.
  examples:
  - english: You already know many of those 5,000 words.
  - english: It is not enough just to know the meaning of a word.
  - english: learn it in phrases
  - english: note pronunciation problems
  pitfalls:
  - Focusing solely on dictionary definitions can hinder proper usage.
  - Ignoring a word's register can lead to inappropriate communication.
  - Neglecting pronunciation can make it difficult for others to understand you.
  practicePrompts:
  - id: learning-vocabulary-prompt-1
    type: open_text
    targetSkill: VOCABULARY
    prompt: Explain the main advice from 'Learning vocabulary' and include two key
      ideas such as 'Knowing the definition of a word isn't enough; you also need
      to understand its usage.'.
  - id: learning-vocabulary-prompt-2
    type: open_text
    targetSkill: VOCABULARY
    prompt: Use expressions such as 'You already know many of those 5,000 words.'
      and 'It is not enough just to know the meaning of a word.' to write four short
      sentences about 'Learning vocabulary'.
