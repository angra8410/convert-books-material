chapter:
  id: politics-and-public-institutions
  title: Politics and public institutions
  order: 38
  cefr:
  - B2
  tags: []
  summary: This unit introduces vocabulary for political systems, elections, and public institutions. It contrasts presidential and parliamentary systems and includes key words for representation and government.
  points:
  - Political systems include republic, monarchy, dictatorship, presidential government, and parliamentary government.
  - Election vocabulary includes candidate, constituency, electorate, majority, seat, and term.
  - The Prime Minister and President have different roles depending on the political system.
  - Public institutions and political language often focus on representation and power.
  - Government vocabulary often combines abstract nouns with election and leadership verbs.
  - Political terms need context because they are system-specific.
  examples:
  - english: republic / monarchy / dictatorship / parliamentary government / presidential government
  - english: Prime Minister / President / Cabinet / Parliament
  - english: candidate / constituency / electorate / majority / seat / term
  - english: general election / represent voters / appoint officials
  pitfalls:
  - Do not assume presidential and parliamentary systems work in the same way.
  - Do not confuse electorate with constituency.
  - Do not treat monarchy as identical to absolute rule in every context.
