  - id: politics-and-public-institutions-prompt-1
    type: open_text
    targetSkill: VOCABULARY
    prompt: Explain the difference between a presidential and a parliamentary system, using examples from this unit.
  - id: politics-and-public-institutions-prompt-2
    type: open_text
    targetSkill: VOCABULARY
    prompt: Describe an election using vocabulary such as candidate, constituency, majority, seat, or electorate.
