chapter:
  id: using-your-dictionary
  title: Using your dictionary
  order: 3
  cefr:
  - B2
  tags: []
  summary: A good learner's dictionary provides more than just definitions; it offers
    pronunciation guides, stress markings, usage examples, synonyms, antonyms, collocations,
    and information about word class and relationships between words.
  points:
  - Dictionaries indicate pronunciation using symbols.
  - Dictionaries show word stress through markings or typography.
  - Dictionaries explain how words are used grammatically (usage).
  - Dictionaries provide synonyms (similar meaning) and antonyms (opposites).
  - Dictionaries list common collocations (words that go together).
  - Dictionaries differentiate between transitive and intransitive verbs.
  examples:
  - english: th in thick
  - english: sh in she
  - english: suggest + clause (not an infinitive) - I suggest you ring her right away.
  - english: mislay and misplace (synonyms)
  - english: friend != enemy/foe (antonyms)
  pitfalls:
  - Symbols used for pronunciation may differ from standard letters.
  - Incorrectly using a word without understanding its grammatical usage.
  - Failing to consider collocations when forming sentences.
  practicePrompts:
  - id: using-your-dictionary-prompt-1
    type: open_text
    targetSkill: VOCABULARY
    prompt: Explain three kinds of information a good learner's dictionary can show
      beyond a basic definition.
  - id: using-your-dictionary-prompt-2
    type: open_text
    targetSkill: VOCABULARY
    prompt: Choose one word and describe what pronunciation, stress, grammar, and
      collocation information you would record from a dictionary entry.
