    targetSkill: VOCABULARY
    prompt: Describe a situation using vocabulary such as delighted, grateful, anxious, or furious.
  - id: pleasant-and-unpleasant-feelings-prompt-2
    type: open_text
    targetSkill: VOCABULARY
