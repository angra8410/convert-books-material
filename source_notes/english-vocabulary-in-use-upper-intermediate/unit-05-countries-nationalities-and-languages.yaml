chapter:
  id: countries-nationalities-and-languages
  title: Countries, nationalities and languages
  order: 5
  cefr:
  - B2
  tags: []
  summary: This unit covers the conventions for referring to countries, nationalities,
    languages, and regional groups in English. It highlights rules for country names
    and the adjective patterns commonly used to form nationality words.
  points:
  - Some country names use 'the', including the United States, the United Kingdom,
    and the Netherlands.
  - Nationalities are often formed using suffixes like -ish, -(i)an, -ese, -i, and
    -ic.
  - Certain nationalities have unique noun forms, such as a Finn or a Spaniard.
  - Adjectives describing nationalities can often be used as nouns (e.g., a German).
  - Regional groups and ethnic groups, like 'Asian' or 'European,' can function as
    both adjectives and nouns.
  - People can be monolingual (one language), bilingual (two languages), or multilingual
    (multiple languages).
  examples:
  - english: the United States / the US(A)
  - english: British
  - english: a Spaniard
  - english: monolingual, bilingual, multilingual
  - english: Many Europeans enjoy travelling to the Far East.
  pitfalls:
  - Don't forget to use 'the' with countries like 'the United Kingdom'.
  - Not all nationalities follow the standard suffix rules; some (like 'Swiss') are
    exceptions.
  - Be mindful of whether a nationality is best expressed as an adjective or a noun
    (e.g., 'a German' vs 'a Dane').
  - When referring to people from a nationality, consider adding 'man,' 'woman,' or
    'person' to avoid ambiguity.
