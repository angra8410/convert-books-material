chapter:
  id: abbreviations-and-acronyms
  title: Abbreviations and acronyms
  order: 78
  cefr:
  - B2
  tags: []
  summary: This unit explains abbreviations, acronyms, and clippings and shows how
    they are pronounced and used in different contexts.
  points:
  - Abbreviations can be pronounced as individual letters or as complete words (acronyms).
  - Acronyms are often so familiar that they are no longer considered abbreviations
    and are written in lowercase.
  - Clippings are shortened, informal versions of words.
  - Written abbreviations are frequently used in formal writing, such as letters and
    invitations.
  - Stress placement changes when abbreviations are stressed words in a sentence;
    the stress falls on the last letter.
  - Many acronyms originate from organizations, but some represent concepts or technologies.
  examples:
  - english: CIA / BBC
  - english: NATO
  - english: laser / radar / scuba / sonar
  - english: air con
  - english: RIP
  pitfalls:
  - Remember that some abbreviations are pronounced letter by letter, while others
    are pronounced as words (acronyms).
  - Be aware that some acronyms have become so common that they are no longer written
    in capital letters.
  - Don't confuse clippings with more formal terms; use them appropriately in informal
    situations.
