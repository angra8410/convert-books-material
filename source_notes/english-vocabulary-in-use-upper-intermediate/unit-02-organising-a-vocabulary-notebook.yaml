chapter:
  id: organising-a-vocabulary-notebook
  title: Organising a vocabulary notebook
  order: 2
  cefr:
  - B2
  tags: []
  summary: This unit focuses on methods for organising a vocabulary notebook, going
    beyond simple lists to create a more effective learning tool. It covers grouping
    by meaning, building networks, recording collocations and synonyms/antonyms, and
    noting word class and stress.
  points:
  - Organize your notebook into sections based on broad categories like feelings,
    places, or movement.
  - Use charts and tables to visually structure vocabulary related to specific topics
    (e.g., music).
  - Create network diagrams to connect words and show relationships between them.
  - Record common collocations (words that typically go together) alongside new vocabulary.
  - Note synonyms (words with similar meanings) and antonyms (words with opposite
    meanings).
  - Always record the word class (noun, verb, adjective, etc.) and stress patterns
    of new words.
  examples:
  - english: classical (not classic)
  - english: win (prize, award, medal)
  - english: in a hurry
  - english: urban != rural
  - english: produce (verb) produce (noun) productive (adjective)
  pitfalls:
  - Do not record words only as isolated translations without grouping or context.
  - Do not forget to note collocations, word class, and stress patterns with new
    vocabulary.
  - Do not mix near-synonyms or antonyms without recording how they differ in use.
  practicePrompts:
  - id: organising-a-vocabulary-notebook-prompt-1
    type: open_text
    targetSkill: VOCABULARY
    prompt: Describe a way you could organize your vocabulary notebook to focus on
      words related to your hobbies.
  - id: organising-a-vocabulary-notebook-prompt-2
    type: open_text
    targetSkill: VOCABULARY
    prompt: Imagine a new vocabulary word you've learned. Explain how you would record
      it in your notebook using at least three of the methods described in this section.
