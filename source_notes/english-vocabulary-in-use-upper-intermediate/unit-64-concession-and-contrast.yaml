chapter:
  id: concession-and-contrast
  title: Concession and contrast
  order: 64
  cefr:
  - B2
  tags: []
  summary: This unit focuses on language for concession and contrast, including verbs,
    adverbs, and fixed phrases for showing difference or opposition.
  points:
  - Concession involves accepting part of an idea before presenting a contrasting
    argument.
  - Verbs like 'acknowledge', 'admit', and 'concede' are used to express concession.
  - Informal phrases like 'That's all well and good' signal contrast.
  - More formal phrases like 'On the contrary' and 'In fact' indicate direct opposition.
  - Collocations like 'poles apart' and 'a world of difference' emphasize significant
    differences.
  - '''On the other hand'' presents a contrasting viewpoint.'
  examples:
  - english: I acknowledge that he has worked hard but it isn't enough.
    note: Shows concession - agreeing with a point but then disagreeing.
  - english: That's all very well, but how are you going to pay us back?
    note: An informal phrase expressing contrast.
  - english: In contrast, the USA still uses many non-metric measurements.
    note: Formally highlights a difference.
  - english: When it comes to politics, Jamie and Isla are poles apart.
    note: A collocation used to express a significant difference.
  pitfalls:
  - Confusing 'on the other hand' with 'on the contrary' - the former presents a contrasting
    viewpoint, while the latter states the opposite is true.
  - Using formal phrases ('concede') in informal situations can sound stiff.
  - Misunderstanding the nuance of 'that's all very well' which implies a criticism
    or concern despite initial agreement.
  practicePrompts:
  - id: concession-and-contrast-prompt-1
    type: open_text
    targetSkill: VOCABULARY
    prompt: Write two short examples that show concession and one that shows direct
      contrast.
  - id: concession-and-contrast-prompt-2
    type: open_text
    targetSkill: VOCABULARY
    prompt: Explain the difference between 'on the other hand' and 'on the contrary'
      with one example of each.
