chapter:
  id: discourse-markers-in-spoken-english
  title: Discourse markers in spoken English
  order: 67
  cefr:
  - B2
  tags: []
  summary: This unit introduces common discourse markers used in spoken English to
    organise conversation, manage turn-taking, and comment on what is being said.
  points:
  - Discourse markers help organize conversations and signal changes in direction.
  - They can be used to comment on what is being said, expressing agreement, disagreement,
    or hesitation.
  - Common discourse markers include 'well,' 'right,' 'OK,' 'now,' 'so,' and 'fine'.
  - Some markers introduce suggestions or important points, while others prevent interruptions.
  - Alphabet letters (a, b, c) are often used to list points in informal speech.
  - Listening for discourse markers can improve comprehension in relaxed listening
    situations.
  examples:
  - english: Well, near Boston.
  - english: Right/OK, let's have a look at exercise 3.
  - english: So, where was I? I was telling you about my aunt ...
  - english: Still / On the other hand, we can't complain, it was fine all last week.
  pitfalls:
  - Overusing discourse markers can make speech sound unnatural.
  - The meaning of a discourse marker can vary depending on context.
