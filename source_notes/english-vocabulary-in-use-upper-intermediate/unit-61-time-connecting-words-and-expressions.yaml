chapter:
  id: time-connecting-words-and-expressions
  title: 'Time: connecting words and expressions'
  order: 61
  cefr:
  - B2
  tags: []
  summary: This unit introduces words and expressions for linking events in time,
    including sequence, simultaneity, and later or unspecified stages.
  points:
  - Use expressions such as 'prior to', 'previously', 'earlier on', and 'formerly'
    to refer to something that happened before another event.
  - Use 'in the meantime' and 'meanwhile' for the period between now and a later event.
  - Use 'at the very time', 'at the very moment', and 'simultaneously' for events
    that happen together.
  - Distinguish between 'during' for part of a period and 'throughout' for the whole
    period.
  - Use 'following', 'subsequently', and 'thereafter' to show what happened after
    an earlier event.
  - Use phrases such as 'at a later stage' and 'at some point' for non-specific time
    references.
  examples:
  - english: prior to meeting the committee
  - english: Previously I'd only been to Rome.
  - english: Formerly it was Hedge Lane.
  - english: In the meantime / Meanwhile, relax and have a drink.
  - english: The two events happened simultaneously.
  pitfalls:
  - Do not confuse 'formerly' with 'formally'; 'formerly' refers to an earlier state
    or name.
  - Use 'throughout' only when something continues from the beginning to the end of
    a period.
  - Choose time linkers carefully for register; some are noticeably more formal in
    writing.
